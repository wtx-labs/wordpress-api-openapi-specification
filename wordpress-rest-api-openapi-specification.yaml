# specVersion: 1.0.0 (based on WordPress 6.9.4 API)
openapi: "3.0.3"
info:
  title: "WordPress REST API"
  description: "The WordPress REST API is a powerful part of WordPress that lets you read and write various parts of WordPress data such as posts, pages, users, media, categories, tags, and custom content types defined in the installation."
  version: "v2"
  contact:
    name: "WTX Labs Team"
    url: "https://github.com/wtx-labs/wordpress-api-openapi-specification"
    email: "labs@wtx.pl"
servers:
  - url: "https://example-wordpress.com/wp-json/wp/v2"
security:
  - basicAuth: []
tags:
  - name: "Block Directory"
  - name: "Block Patterns"
  - name: "Block Types"
  - name: "Blocks"
  - name: "Categories"
  - name: "Comments"
  - name: "Font Collections"
  - name: "Font Families"
  - name: "Media"
  - name: "Menu Items"
  - name: "Menu Locations"
  - name: "Menus"
  - name: "Navigation"
  - name: "Other"
  - name: "Pages"
  - name: "Pattern Categories"
  - name: "Pattern Directory"
  - name: "Plugins"
  - name: "Post Statuses"
  - name: "Post Types"
  - name: "Posts"
  - name: "Search"
  - name: "Settings"
  - name: "Sidebars"
  - name: "Tags"
  - name: "Taxonomies"
  - name: "Template Parts"
  - name: "Templates"
  - name: "Themes"
  - name: "Users"
  - name: "Widget Types"
  - name: "Widgets"
components:
  schemas:
    Post:
      title: "Post"
      type: "object"
      properties:
        date:
          description: "The date the post was published, in the site's timezone."
          type: "string"
          format: "date-time"
          nullable: true
        date_gmt:
          description: "The date the post was published, as GMT."
          type: "string"
          format: "date-time"
          nullable: true
        guid:
          description: "The globally unique identifier for the post."
          type: "object"
          properties:
            raw:
              description: "GUID for the post, as it exists in the database."
              type: "string"
            rendered:
              description: "GUID for the post, transformed for display."
              type: "string"
        id:
          description: "Unique identifier for the post."
          type: "integer"
        link:
          description: "URL to the post."
          type: "string"
          format: "uri"
        modified:
          description: "The date the post was last modified, in the site's timezone."
          type: "string"
          format: "date-time"
        modified_gmt:
          description: "The date the post was last modified, as GMT."
          type: "string"
          format: "date-time"
        slug:
          description: "An alphanumeric identifier for the post unique to its type."
          type: "string"
        status:
          description: "A named status for the post."
          type: "string"
          enum:
            - "publish"
            - "future"
            - "draft"
            - "pending"
            - "private"
        type:
          description: "Type of post."
          type: "string"
        password:
          description: "A password to protect access to the content and excerpt."
          type: "string"
        permalink_template:
          description: "Permalink template for the post."
          type: "string"
        generated_slug:
          description: "Slug automatically generated from the post title."
          type: "string"
        class_list:
          description: "An array of the class names for the post container element."
          type: "array"
          items:
            type: "string"
        title:
          description: "The title for the post."
          type: "object"
          properties:
            raw:
              description: "Title for the post, as it exists in the database."
              type: "string"
            rendered:
              description: "HTML title for the post, transformed for display."
              type: "string"
        content:
          description: "The content for the post."
          type: "object"
          properties:
            raw:
              description: "Content for the post, as it exists in the database."
              type: "string"
            rendered:
              description: "HTML content for the post, transformed for display."
              type: "string"
            block_version:
              description: "Version of the content block format used by the post."
              type: "integer"
            protected:
              description: "Whether the content is protected with a password."
              type: "boolean"
        author:
          description: "The ID for the author of the post."
          type: "integer"
        excerpt:
          description: "The excerpt for the post."
          type: "object"
          properties:
            raw:
              description: "Excerpt for the post, as it exists in the database."
              type: "string"
            rendered:
              description: "HTML excerpt for the post, transformed for display."
              type: "string"
            protected:
              description: "Whether the excerpt is protected with a password."
              type: "boolean"
        featured_media:
          description: "The ID of the featured media for the post."
          type: "integer"
        comment_status:
          description: "Whether or not comments are open on the post."
          type: "string"
          enum:
            - "open"
            - "closed"
        ping_status:
          description: "Whether or not the post can be pinged."
          type: "string"
          enum:
            - "open"
            - "closed"
        format:
          description: "The format for the post."
          type: "string"
          enum:
            - "standard"
            - "aside"
            - "chat"
            - "gallery"
            - "link"
            - "image"
            - "quote"
            - "status"
            - "video"
            - "audio"
        meta:
          description: "Meta fields."
          type: "object"
          properties:
            footnotes:
              type: "string"
              title: ""
              description: ""
              default: ""
        sticky:
          description: "Whether or not the post should be treated as sticky."
          type: "boolean"
        template:
          description: "The theme file to use to display the post."
          type: "string"
        categories:
          description: "The terms assigned to the post in the category taxonomy."
          type: "array"
          items:
            type: "integer"
        tags:
          description: "The terms assigned to the post in the post_tag taxonomy."
          type: "array"
          items:
            type: "integer"
