          description: "Limit result set to comments of specific parent IDs."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "parent_exclude"
          in: "query"
          description: "Ensure result set excludes specific parent IDs."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "post"
