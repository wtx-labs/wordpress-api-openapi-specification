            disable-custom-colors:
              description: "Whether the theme disables custom colors."
              type: "boolean"
              default: false
            disable-custom-font-sizes:
              description: "Whether the theme disables custom font sizes."
              type: "boolean"
              default: false
            disable-custom-gradients:
              description: "Whether the theme disables custom gradients."
              type: "boolean"
              default: false
            disable-layout-styles:
              description: "Whether the theme disables generated layout styles."
              type: "boolean"
              default: false
            editor-color-palette:
              description: "Custom color palette if defined by the theme."
              oneOf:
                - type: "boolean"
                - type: "array"
                  items:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                      slug:
                        type: "string"
                      color:
                        type: "string"
                    additionalProperties: false
            editor-font-sizes:
              description: "Custom font sizes if defined by the theme."
              oneOf:
                - type: "boolean"
                - type: "array"
                  items:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                      size:
                        type: "number"
                      slug:
                        type: "string"
                    additionalProperties: false
            editor-gradient-presets:
              description: "Custom gradient presets if defined by the theme."
              oneOf:
                - type: "boolean"
                - type: "array"
                  items:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                      gradient:
                        type: "string"
                      slug:
                        type: "string"
                    additionalProperties: false
            editor-spacing-sizes:
              description: "Custom spacing sizes if defined by the theme."
              oneOf:
                - type: "boolean"
                - type: "array"
                  items:
                    type: "object"
                    properties:
                      name:
                        type: "string"
                      size:
                        type: "string"
                      slug:
                        type: "string"
                    additionalProperties: false
            editor-styles:
              description: "Whether theme opts in to the editor styles CSS wrapper."
              type: "boolean"
              default: false
            html5:
              description: "Allows use of HTML5 markup for search forms, comment forms, comment lists, gallery, and caption."
              oneOf:
                - type: "boolean"
                - type: "array"
                  items:
                    type: "string"
                    enum:
                      - "search-form"
                      - "comment-form"
                      - "comment-list"
                      - "gallery"
                      - "caption"
                      - "script"
                      - "style"
            formats:
              description: "Post formats supported."
              type: "array"
              default:
                - "standard"
              items:
                type: "string"
                enum:
                  - "standard"
                  - "aside"
                  - "chat"
                  - "gallery"
                  - "link"
                  - "image"
                  - "quote"
                  - "status"
                  - "video"
                  - "audio"
            post-thumbnails:
              description: "The post types that support thumbnails or true if all post types are supported."
              oneOf:
                - type: "boolean"
                - type: "array"
                  items:
                    type: "string"
            responsive-embeds:
              description: "Whether the theme supports responsive embedded content."
              type: "boolean"
              default: false
            title-tag:
              description: "Whether the theme can manage the document title tag."
              type: "boolean"
              default: false
            wp-block-styles:
              description: "Whether theme opts in to default WordPress block styles for viewing."
              type: "boolean"
              default: false
        theme_uri:
          description: "The URI of the theme's webpage."
          type: "object"
          properties:
            raw:
              description: "The URI of the theme's webpage, as found in the theme header."
              type: "string"
              format: "uri"
            rendered:
              description: "The URI of the theme's webpage, transformed for display."
              type: "string"
              format: "uri"
        version:
          description: "The theme's current version."
          type: "string"
        status:
          description: "A named status for the theme."
          type: "string"
          enum:
            - "inactive"
            - "active"
        default_template_types:
          description: "A list of default template types."
          type: "array"
          items:
            type: "object"
            properties:
              slug:
                type: "string"
              title:
                type: "string"
              description:
                type: "string"
        default_template_part_areas:
          description: "A list of allowed area values for template parts."
          type: "array"
          items:
            type: "object"
            properties:
              area:
                type: "string"
              label:
                type: "string"
              description:
                type: "string"
              icon:
                type: "string"
              area_tag:
                type: "string"
    Plugin:
      title: "Plugin"
      type: "object"
      properties:
        plugin:
          description: "The plugin file."
          type: "string"
          pattern: "[^.\\/]+(?:\\/[^.\\/]+)?"
        status:
          description: "The plugin activation status."
          type: "string"
          enum:
            - "inactive"
            - "active"
        name:
          description: "The plugin name."
          type: "string"
        plugin_uri:
          description: "The plugin's website address."
          type: "string"
          format: "uri"
        author:
          description: "The plugin author."
          type: "string"
        author_uri:
          description: "Plugin author's website address."
          type: "string"
          format: "uri"
        description:
          description: "The plugin description."
          type: "object"
          properties:
            raw:
              description: "The raw plugin description."
              type: "string"
            rendered:
              description: "The plugin description formatted for display."
              type: "string"
        version:
          description: "The plugin version number."
          type: "string"
        network_only:
          description: "Whether the plugin can only be activated network-wide."
          type: "boolean"
        requires_wp:
          description: "Minimum required version of WordPress."
          type: "string"
        requires_php:
          description: "Minimum required version of PHP."
          type: "string"
        textdomain:
          description: "The plugin's text domain."
          type: "string"
    Sidebar:
      title: "Sidebar"
      type: "object"
      properties:
        id:
          description: "ID of sidebar."
          type: "string"
        name:
          description: "Unique name identifying the sidebar."
          type: "string"
        description:
          description: "Description of sidebar."
          type: "string"
        class:
          description: "Extra CSS class to assign to the sidebar in the Widgets interface."
          type: "string"
        before_widget:
          description: "HTML content to prepend to each widget's HTML output when assigned to this sidebar. Default is an opening
            list item element."
          type: "string"
          default: ""
        after_widget:
          description: "HTML content to append to each widget's HTML output when assigned to this sidebar. Default is a closing
            list item element."
          type: "string"
          default: ""
        before_title:
          description: "HTML content to prepend to the sidebar title when displayed. Default is an opening h2 element."
          type: "string"
          default: ""
        after_title:
          description: "HTML content to append to the sidebar title when displayed. Default is a closing h2 element."
          type: "string"
          default: ""
        status:
          description: "Status of sidebar."
          type: "string"
          enum:
            - "active"
            - "inactive"
        widgets:
          description: "Nested widgets."
          type: "array"
          items:
            oneOf:
              - type: "object"
              - type: "string"
          default: []
    Widgettype:
      title: "Widgettype"
      type: "object"
      properties:
        id:
          description: "Unique slug identifying the widget type."
          type: "string"
        name:
          description: "Human-readable name identifying the widget type."
          type: "string"
          default: ""
        description:
          description: "Description of the widget."
          type: "string"
          default: ""
        is_multi:
          description: "Whether the widget supports multiple instances"
          type: "boolean"
        classname:
          description: "Class name"
          type: "string"
          default: ""
    Widget:
      title: "Widget"
      type: "object"
      properties:
        id:
          description: "Unique identifier for the widget."
          type: "string"
        id_base:
          description: "The type of the widget. Corresponds to ID in widget-types endpoint."
          type: "string"
        sidebar:
          description: "The sidebar the widget belongs to."
          type: "string"
          default: "wp_inactive_widgets"
        rendered:
          description: "HTML representation of the widget."
          type: "string"
        rendered_form:
          description: "HTML representation of the widget admin form."
          type: "string"
        instance:
          description: "Instance settings of the widget, if supported."
          type: "object"
          properties:
            encoded:
              description: "Base64 encoded representation of the instance settings."
              type: "string"
            hash:
              description: "Cryptographic hash of the instance settings."
              type: "string"
            raw:
              description: "Unencoded instance settings, if supported."
              type: "object"
        form_data:
          description: "URL-encoded form data from the widget admin form. Used to update a widget that does not support instance.
            Write only."
          type: "string"
    Blockdirectoryitem:
      title: "Blockdirectoryitem"
      type: "object"
      properties:
        name:
          description: "The block name, in namespace/block-name format."
          type: "string"
        title:
          description: "The block title, in human readable format."
          type: "string"
        description:
          description: "A short description of the block, in human readable format."
          type: "string"
        id:
          description: "The block slug."
          type: "string"
        rating:
          description: "The star rating of the block."
          type: "number"
        rating_count:
          description: "The number of ratings."
          type: "integer"
        active_installs:
          description: "The number sites that have activated this block."
          type: "integer"
        author_block_rating:
          description: "The average rating of blocks published by the same author."
          type: "number"
        author_block_count:
          description: "The number of blocks published by the same author."
          type: "integer"
        author:
          description: "The WordPress.org username of the block author."
          type: "string"
        icon:
          description: "The block icon."
          type: "string"
          format: "uri"
        last_updated:
          description: "The date when the block was last updated."
          type: "string"
          format: "date-time"
        humanized_updated:
          description: "The date when the block was last updated, in human readable format."
          type: "string"
    Patterndirectoryitem:
      title: "Patterndirectoryitem"
      type: "object"
      properties:
        id:
          description: "The pattern ID."
          type: "integer"
          minimum: 1
        title:
          description: "The pattern title, in human readable format."
          type: "string"
          minLength: 1
        content:
          description: "The pattern content."
          type: "string"
          minLength: 1
        categories:
          description: "The pattern's category slugs."
          type: "array"
          uniqueItems: true
          items:
            type: "string"
        keywords:
          description: "The pattern's keywords."
          type: "array"
          uniqueItems: true
          items:
            type: "string"
        description:
          description: "A description of the pattern."
          type: "string"
          minLength: 1
        viewport_width:
          description: "The preferred width of the viewport when previewing a pattern, in pixels."
          type: "integer"
        block_types:
          description: "The block types which can use this pattern."
          type: "array"
          uniqueItems: true
          items:
            type: "string"
    Blockpattern:
      title: "Blockpattern"
      type: "object"
      properties:
        name:
          description: "The pattern name."
          type: "string"
        title:
          description: "The pattern title, in human readable format."
          type: "string"
        content:
          description: "The pattern content."
          type: "string"
        description:
          description: "The pattern detailed description."
          type: "string"
        viewport_width:
          description: "The pattern viewport width for inserter preview."
          type: "number"
        inserter:
          description: "Determines whether the pattern is visible in inserter."
          type: "boolean"
        categories:
          description: "The pattern category slugs."
          type: "array"
          items:
            type: "string"
        keywords:
          description: "The pattern keywords."
          type: "array"
          items:
            type: "string"
        block_types:
          description: "Block types that the pattern is intended to be used with."
          type: "array"
          items:
            type: "string"
        post_types:
          description: "An array of post types that the pattern is restricted to be used with."
          type: "array"
          items:
            type: "string"
        template_types:
          description: "An array of template types where the pattern fits."
          type: "array"
          items:
            type: "string"
        source:
          description: "Where the pattern comes from e.g. core"
          type: "string"
          enum:
            - "core"
            - "plugin"
            - "theme"
            - "pattern-directory/core"
            - "pattern-directory/theme"
            - "pattern-directory/featured"
    Blockpatterncategory:
      title: "Blockpatterncategory"
      type: "object"
      properties:
        name:
          description: "The category name."
          type: "string"
        label:
          description: "The category label, in human readable format."
          type: "string"
        description:
          description: "The category description, in human readable format."
          type: "string"
    Menulocation:
      title: "Menulocation"
      type: "object"
      properties:
        name:
          description: "The name of the menu location."
          type: "string"
        description:
          description: "The description of the menu location."
          type: "string"
        menu:
          description: "The ID of the assigned menu."
          type: "integer"
    Fontcollection:
      title: "Fontcollection"
      type: "object"
      properties:
        slug:
          description: "Unique identifier for the font collection."
          type: "string"
        name:
          description: "The name for the font collection."
          type: "string"
        description:
          description: "The description for the font collection."
          type: "string"
        font_families:
          description: "The font families for the font collection."
          type: "array"
          items:
            type: "string"
        categories:
          description: "The categories for the font collection."
          type: "array"
          items:
            type: "string"
  securitySchemes:
    basicAuth:
      type: "http"
      scheme: "basic"
      description: "WordPress username + Application Password"
paths:
  /posts:
    get:
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Post"
      parameters:
        - name: "context"
          in: "query"
          description: "Scope under which the request is made; determines fields present in response."
          required: false
          schema:
            default: "view"
            enum:
              - "view"
              - "embed"
              - "edit"
            type: "string"
        - name: "page"
          in: "query"
          description: "Current page of the collection."
          required: false
          schema:
            default: 1
            minimum: 1
            type: "integer"
        - name: "per_page"
          in: "query"
          description: "Maximum number of items to be returned in result set."
          required: false
          schema:
            default: 10
            minimum: 1
            maximum: 100
            type: "integer"
        - name: "search"
          in: "query"
          description: "Limit results to those matching a string."
          required: false
          schema:
            type: "string"
        - name: "after"
          in: "query"
          description: "Limit response to posts published after a given ISO8601 compliant date."
          required: false
          schema:
            format: "date-time"
        - name: "modified_after"
          in: "query"
          description: "Limit response to posts modified after a given ISO8601 compliant date."
          required: false
          schema:
            format: "date-time"
        - name: "author"
          in: "query"
          description: "Limit result set to posts assigned to specific authors."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "author_exclude"
          in: "query"
          description: "Ensure result set excludes posts assigned to specific authors."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "before"
          in: "query"
          description: "Limit response to posts published before a given ISO8601 compliant date."
          required: false
          schema:
            format: "date-time"
        - name: "modified_before"
          in: "query"
          description: "Limit response to posts modified before a given ISO8601 compliant date."
          required: false
          schema:
            format: "date-time"
        - name: "exclude"
          in: "query"
          description: "Ensure result set excludes specific IDs."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "include"
          in: "query"
          description: "Limit result set to specific IDs."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "search_semantics"
          in: "query"
          description: "How to interpret the search input."
          required: false
          schema:
            enum:
              - "exact"
            type: "string"
        - name: "offset"
          in: "query"
          description: "Offset the result set by a specific number of items."
          required: false
          schema:
            type: "string"
        - name: "order"
          in: "query"
          description: "Order sort attribute ascending or descending."
          required: false
          schema:
            default: "desc"
            enum:
              - "asc"
              - "desc"
            type: "string"
        - name: "orderby"
          in: "query"
          description: "Sort collection by post attribute."
          required: false
          schema:
            default: "date"
            enum:
              - "author"
              - "date"
              - "id"
              - "include"
              - "modified"
              - "parent"
              - "relevance"
              - "slug"
              - "include_slugs"
              - "title"
            type: "string"
        - name: "search_columns"
          in: "query"
          description: "Array of column names to be searched."
          required: false
          schema:
            items:
              enum:
                - "post_title"
                - "post_content"
                - "post_excerpt"
              type: "string"
            type: "array"
        - name: "slug"
          in: "query"
          description: "Limit result set to posts with one or more specific slugs."
          required: false
          schema:
            items:
              type: "string"
            type: "array"
        - name: "status"
          in: "query"
          description: "Limit result set to posts assigned one or more statuses."
          required: false
          schema:
            items:
              enum:
                - "publish"
                - "future"
                - "draft"
                - "pending"
                - "private"
                - "trash"
                - "auto-draft"
                - "inherit"
                - "request-pending"
                - "request-confirmed"
                - "request-failed"
                - "request-completed"
                - "any"
              type: "string"
            type: "array"
        - name: "tax_relation"
          in: "query"
          description: "Limit result set based on relationship between multiple taxonomies."
          required: false
          schema:
            enum:
              - "AND"
              - "OR"
            type: "string"
        - name: "categories"
          in: "query"
          description: "Limit result set to items with specific terms assigned in the categories taxonomy."
          required: false
          schema:
            oneOf:
              - title: "Term ID List"
                description: "Match terms with the listed IDs."
                type: "array"
                items:
                  type: "integer"
              - title: "Term ID Taxonomy Query"
                description: "Perform an advanced term query."
                type: "object"
                properties:
                  terms:
                    description: "Term IDs."
                    type: "array"
                    items:
                      type: "integer"
                    default: []
                  include_children:
                    description: "Whether to include child terms in the terms limiting the result set."
                    type: "boolean"
                    default: false
                  operator:
                    description: "Whether items must be assigned all or any of the specified terms."
                    type: "string"
                    enum:
                      - "AND"
                      - "OR"
                    default: "OR"
                additionalProperties: false
        - name: "categories_exclude"
          in: "query"
          description: "Limit result set to items except those with specific terms assigned in the categories taxonomy."
          required: false
          schema:
            oneOf:
              - title: "Term ID List"
                description: "Match terms with the listed IDs."
                type: "array"
                items:
                  type: "integer"
              - title: "Term ID Taxonomy Query"
                description: "Perform an advanced term query."
                type: "object"
                properties:
                  terms:
                    description: "Term IDs."
                    type: "array"
                    items:
                      type: "integer"
                    default: []
                  include_children:
                    description: "Whether to include child terms in the terms limiting the result set."
                    type: "boolean"
                    default: false
                additionalProperties: false
        - name: "tags"
          in: "query"
          description: "Limit result set to items with specific terms assigned in the tags taxonomy."
          required: false
          schema:
            oneOf:
              - title: "Term ID List"
                description: "Match terms with the listed IDs."
                type: "array"
                items:
                  type: "integer"
              - title: "Term ID Taxonomy Query"
                description: "Perform an advanced term query."
                type: "object"
                properties:
                  terms:
                    description: "Term IDs."
                    type: "array"
                    items:
                      type: "integer"
                    default: []
                  operator:
                    description: "Whether items must be assigned all or any of the specified terms."
                    type: "string"
                    enum:
                      - "AND"
                      - "OR"
                    default: "OR"
                additionalProperties: false
        - name: "tags_exclude"
          in: "query"
          description: "Limit result set to items except those with specific terms assigned in the tags taxonomy."
          required: false
          schema:
            oneOf:
              - title: "Term ID List"
                description: "Match terms with the listed IDs."
                type: "array"
                items:
                  type: "integer"
              - title: "Term ID Taxonomy Query"
                description: "Perform an advanced term query."
                type: "object"
                properties:
                  terms:
                    description: "Term IDs."
                    type: "array"
                    items:
                      type: "integer"
                    default: []
                additionalProperties: false
        - name: "sticky"
          in: "query"
          description: "Limit result set to items that are sticky."
          required: false
          schema:
            type: "string"
        - name: "ignore_sticky"
          in: "query"
          description: "Whether to ignore sticky posts or not."
          required: false
          schema:
            default: true
        - name: "format"
          in: "query"
          description: "Limit result set to items assigned one or more given formats."
          required: false
          schema:
            uniqueItems: true
            items:
              enum:
                - "standard"
                - "aside"
                - "chat"
                - "gallery"
                - "link"
                - "image"
                - "quote"
                - "status"
                - "video"
                - "audio"
              type: "string"
            type: "array"
      tags:
        - "Posts"
    post:
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: "object"
              properties:
                date:
                  description: "The date the post was published, in the site's timezone."
                  type: "string"
                  format: "date-time"
                  nullable: true
                date_gmt:
                  description: "The date the post was published, as GMT."
                  type: "string"
                  format: "date-time"
                  nullable: true
                slug:
                  description: "An alphanumeric identifier for the post unique to its type."
                  type: "string"
                status:
                  description: "A named status for the post."
                  type: "string"
                  enum:
                    - "publish"
                    - "future"
                    - "draft"
                    - "pending"
                    - "private"
                password:
                  description: "A password to protect access to the content and excerpt."
                  type: "string"
                title:
                  description: "The title for the post."
                  type: "object"
                  properties:
                    raw:
                      description: "Title for the post, as it exists in the database."
                      type: "string"
                    rendered:
                      description: "HTML title for the post, transformed for display."
                      type: "string"
                content:
                  description: "The content for the post."
                  type: "object"
                  properties:
                    raw:
                      description: "Content for the post, as it exists in the database."
                      type: "string"
                    rendered:
                      description: "HTML content for the post, transformed for display."
                      type: "string"
                    block_version:
                      description: "Version of the content block format used by the post."
                      type: "integer"
                    protected:
                      description: "Whether the content is protected with a password."
                      type: "boolean"
                author:
                  description: "The ID for the author of the post."
                  type: "integer"
                excerpt:
                  description: "The excerpt for the post."
                  type: "object"
                  properties:
                    raw:
                      description: "Excerpt for the post, as it exists in the database."
                      type: "string"
                    rendered:
                      description: "HTML excerpt for the post, transformed for display."
                      type: "string"
                    protected:
                      description: "Whether the excerpt is protected with a password."
                      type: "boolean"
                featured_media:
                  description: "The ID of the featured media for the post."
                  type: "integer"
                comment_status:
                  description: "Whether or not comments are open on the post."
