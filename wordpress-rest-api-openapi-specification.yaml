          required: false
          schema:
            format: "email"
        - name: "before"
          in: "query"
          description: "Limit response to comments published before a given ISO8601 compliant date."
          required: false
          schema:
            format: "date-time"
        - name: "exclude"
          in: "query"
          description: "Ensure result set excludes specific IDs."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "include"
          in: "query"
          description: "Limit result set to specific IDs."
          required: false
          schema:
            items:
              type: "integer"
            type: "array"
        - name: "offset"
          in: "query"
          description: "Offset the result set by a specific number of items."
          required: false
          schema:
            type: "string"
        - name: "order"
          in: "query"
          description: "Order sort attribute ascending or descending."
          required: false
          schema:
            default: "desc"
            enum:
              - "asc"
              - "desc"
            type: "string"
        - name: "orderby"
          in: "query"
          description: "Sort collection by comment attribute."
          required: false
          schema:
            default: "date_gmt"
