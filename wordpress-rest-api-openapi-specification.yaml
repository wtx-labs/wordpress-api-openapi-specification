            default: "date"
            enum:
              - "author"
              - "date"
              - "id"
              - "include"
              - "modified"
              - "parent"
              - "relevance"
              - "slug"
              - "include_slugs"
              - "title"
            type: "string"
        - name: "search_columns"
          in: "query"
          description: "Array of column names to be searched."
          required: false
          schema:
            items:
              enum:
                - "post_title"
                - "post_content"
                - "post_excerpt"
              type: "string"
            type: "array"
        - name: "slug"
          in: "query"
          description: "Limit result set to posts with one or more specific slugs."
          required: false
          schema:
            items:
              type: "string"
            type: "array"
        - name: "status"
          in: "query"
          description: "Limit result set to posts assigned one or more statuses."
          required: false
          schema:
            items:
              enum:
                - "publish"
                - "future"
                - "draft"
                - "pending"
                - "private"
                - "trash"
                - "auto-draft"
                - "inherit"
                - "request-pending"
                - "request-confirmed"
                - "request-failed"
                - "request-completed"
                - "any"
              type: "string"
            type: "array"
        - name: "tax_relation"
          in: "query"
          description: "Limit result set based on relationship between multiple taxonomies."
          required: false
          schema:
            enum:
              - "AND"
              - "OR"
            type: "string"
        - name: "wp_pattern_category"
          in: "query"
          description: "Limit result set to items with specific terms assigned in the wp_pattern_category taxonomy."
          required: false
          schema:
            oneOf:
              - title: "Term ID List"
                description: "Match terms with the listed IDs."
                type: "array"
                items:
                  type: "integer"
              - title: "Term ID Taxonomy Query"
                description: "Perform an advanced term query."
                type: "object"
                properties:
                  terms:
                    description: "Term IDs."
                    type: "array"
                    items:
                      type: "integer"
                    default: []
                  operator:
                    description: "Whether items must be assigned all or any of the specified terms."
                    type: "string"
                    enum:
                      - "AND"
                      - "OR"
                    default: "OR"
                additionalProperties: false
        - name: "wp_pattern_category_exclude"
          in: "query"
          description: "Limit result set to items except those with specific terms assigned in the wp_pattern_category taxonomy."
          required: false
          schema:
            oneOf:
              - title: "Term ID List"
                description: "Match terms with the listed IDs."
                type: "array"
                items:
                  type: "integer"
              - title: "Term ID Taxonomy Query"
                description: "Perform an advanced term query."
                type: "object"
                properties:
                  terms:
                    description: "Term IDs."
                    type: "array"
                    items:
                      type: "integer"
                    default: []
